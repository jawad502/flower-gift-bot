<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Gift</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-gradient-start: #1a0a2e;
            --bg-gradient-mid: #2d1b4e;
            --primary-pink: #ff9de2;
            --primary-orange: #ffb347;
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --text-dim: rgba(255, 255, 255, 0.5);
            --card-bg: rgba(255, 255, 255, 0.07);
            --card-border: rgba(255, 255, 255, 0.12);
            --input-bg: rgba(255, 255, 255, 0.07);
            --input-border: rgba(255, 255, 255, 0.15);
            --shadow-glow: rgba(255, 157, 226, 0.3);
            --border-radius-lg: 20px;
            --border-radius-md: 16px;
            --border-radius-sm: 14px;
            --spacing-xs: 6px;
            --spacing-sm: 10px;
            --spacing-md: 14px;
            --spacing-lg: 20px;
            --spacing-xl: 30px;
            --transition-fast: 0.2s ease;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-mid), var(--bg-gradient-start));
            min-height: 100vh;
            color: var(--text-white);
            overflow-x: hidden;
        }

        /* Header */
        .header {
            text-align: center;
            padding: var(--spacing-xl) var(--spacing-lg) var(--spacing-sm);
        }

        .header h1 {
            font-size: 26px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--primary-pink), var(--primary-orange), var(--primary-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: var(--spacing-xs);
        }

        .header p {
            color: var(--text-muted);
            font-size: 13px;
        }

        /* Flower Grid */
        .flowers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--spacing-lg);
            padding: var(--spacing-lg);
        }

        .flower-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius-lg);
            padding: 22px var(--spacing-md);
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-fast);
            position: relative;
            overflow: visible;
            perspective: 800px;
            transform-style: preserve-3d;
        }

        .flower-card:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .flower-card:hover .flower-emoji {
            transform: rotateY(180deg) scale(1.1);
        }

        .flower-card:focus {
            outline: 2px solid var(--primary-pink);
            outline-offset: 2px;
        }

        .flower-card:active {
            transform: scale(0.96);
        }

        .flower-card.selected {
            border-color: var(--primary-pink);
            background: rgba(255, 157, 226, 0.15);
            box-shadow: 0 0 30px var(--shadow-glow), 0 10px 40px rgba(255, 157, 226, 0.2);
        }

        .flower-emoji-container {
            display: inline-block;
            width: 80px;
            height: 80px;
            margin-bottom: var(--spacing-sm);
            position: relative;
            transform-style: preserve-3d;
        }

        .flower-emoji {
            font-size: 56px;
            display: block;
            filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.4))
                    drop-shadow(0 -4px 8px rgba(255, 255, 255, 0.1));
            transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform-style: preserve-3d;
            backface-visibility: visible;
        }

        .flower-emoji::before {
            content: attr(data-emoji);
            position: absolute;
            top: 0;
            left: 0;
            transform: translateZ(-20px);
            opacity: 0.3;
            filter: blur(4px);
        }

        .flower-emoji::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%) rotateX(90deg);
            width: 40px;
            height: 20px;
            background: radial-gradient(ellipse, rgba(255, 157, 226, 0.4) 0%, transparent 70%);
            filter: blur(8px);
        }

        .flower-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .flower-meaning {
            font-size: 11px;
            color: var(--text-dim);
        }

        .checkmark {
            position: absolute;
            top: var(--spacing-sm);
            right: var(--spacing-sm);
            font-size: 16px;
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .flower-card.selected .checkmark {
            opacity: 1;
        }

        /* Message Section */
        .message-section {
            padding: 0 var(--spacing-lg) var(--spacing-lg);
            display: none;
        }

        .message-section.visible {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-section label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: var(--spacing-sm);
        }

        .message-section textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: var(--border-radius-sm);
            padding: var(--spacing-md);
            color: var(--text-white);
            font-size: 14px;
            resize: none;
            height: 90px;
            outline: none;
            font-family: inherit;
            transition: border-color var(--transition-fast);
        }

        .message-section textarea:focus {
            border-color: var(--primary-pink);
        }

        .message-section textarea::placeholder {
            color: var(--text-dim);
        }

        /* Send Button */
        .send-btn {
            width: 100%;
            margin-top: var(--spacing-lg);
            padding: 16px;
            background: linear-gradient(135deg, var(--primary-pink), var(--primary-orange));
            border: none;
            border-radius: var(--border-radius-md);
            font-size: 16px;
            font-weight: 700;
            color: var(--bg-gradient-start);
            cursor: pointer;
            transition: opacity var(--transition-fast), transform var(--transition-fast);
        }

        .send-btn:hover {
            opacity: 0.95;
        }

        .send-btn:active {
            opacity: 0.85;
            transform: scale(0.98);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Animations */
        .floating {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotateX(0deg); }
            50% { transform: translateY(-8px) rotateX(10deg); }
        }

        /* Utility */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
    </style>
</head>
<body>

<header class="header">
    <h1>🌸 Flower Gift</h1>
    <p>Pick a flower and send it to someone special</p>
</header>

<main>
    <div class="flowers-grid" id="flowersGrid" role="listbox" aria-label="Select a flower"></div>

    <section class="message-section" id="messageSection" aria-live="polite">
        <label for="messageInput">💬 Write a message with your flower</label>
        <textarea 
            id="messageInput" 
            placeholder="Write something sweet..." 
            maxlength="200"
            aria-label="Your message"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendFlower()" disabled>
            Send Flower 💝
        </button>
    </section>
</main>

<script>
    (function() {
        'use strict';

        // Configuration
        const FLOWERS = [
            { key: 'rose', emoji: '🌹', name: 'Rose', meaning: 'Love & passion' },
            { key: 'sunflower', emoji: '🌻', name: 'Sunflower', meaning: 'Happiness & friendship' },
            { key: 'tulip', emoji: '🌷', name: 'Tulip', meaning: 'Care & warmth' },
            { key: 'jasmine', emoji: '🌸', name: 'Jasmine', meaning: 'Grace & elegance' },
            { key: 'lotus', emoji: '🪷', name: 'Lotus', meaning: 'Spiritual love' },
            { key: 'bouquet', emoji: '💐', name: 'Bouquet', meaning: 'Celebration & joy' },
            { key: 'daisy', emoji: '🌼', name: 'Daisy', meaning: 'Innocence & hope' },
            { key: 'cherry', emoji: '🌺', name: 'Cherry Blossom', meaning: 'Beauty & renewal' },
        ];

        const MESSAGE_MAX_LENGTH = 200;
        const TELEGRAM_BOT_USERNAME = 'flower_gift_bot';

        // State
        let selectedFlower = null;

        // DOM Elements
        const elements = {
            flowersGrid: document.getElementById('flowersGrid'),
            messageSection: document.getElementById('messageSection'),
            messageInput: document.getElementById('messageInput'),
            sendBtn: document.getElementById('sendBtn'),
        };

        // Telegram WebApp initialization
        function initTelegram() {
            if (window.Telegram && window.Telegram.WebApp) {
                const tg = window.Telegram.WebApp;
                tg.expand();
                tg.ready();
                return tg;
            }
            return null;
        }

        // Create flower card element
        function createFlowerCard(flower) {
            const card = document.createElement('div');
            card.className = 'flower-card';
            card.id = `card-${flower.key}`;
            card.setAttribute('role', 'option');
            card.setAttribute('aria-label', `${flower.name} - ${flower.meaning}`);
            card.setAttribute('tabindex', '0');
            
            card.innerHTML = `
                <span class="checkmark" aria-hidden="true">✅</span>
                <div class="flower-emoji-container floating">
                    <span class="flower-emoji" data-emoji="${flower.emoji}">${flower.emoji}</span>
                </div>
                <div class="flower-name">${flower.name}</div>
                <div class="flower-meaning">${flower.meaning}</div>
            `;

            // Click handler
            card.addEventListener('click', () => selectFlower(flower));
            
            // Keyboard handler
            card.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    selectFlower(flower);
                }
            });

            return card;
        }

        // Render all flower cards
        function renderFlowers() {
            const fragment = document.createDocumentFragment();
            FLOWERS.forEach(flower => {
                fragment.appendChild(createFlowerCard(flower));
            });
            elements.flowersGrid.appendChild(fragment);
        }

        // Select a flower
        function selectFlower(flower) {
            // Deselect all cards
            document.querySelectorAll('.flower-card').forEach(card => {
                card.classList.remove('selected');
                card.setAttribute('aria-selected', 'false');
            });

            // Select the chosen card
            const selectedCard = document.getElementById(`card-${flower.key}`);
            selectedCard.classList.add('selected');
            selectedCard.setAttribute('aria-selected', 'true');

            selectedFlower = flower;
            elements.messageSection.classList.add('visible');
            
            // Focus on message input
            setTimeout(() => elements.messageInput.focus(), 100);
            
            // Scroll into view smoothly
            selectedCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            
            // Enable send button if message exists
            updateSendButtonState();
        }

        // Update send button state
        function updateSendButtonState() {
            const message = elements.messageInput.value.trim();
            elements.sendBtn.disabled = !selectedFlower || !message;
        }

        // Validate message
        function validateMessage(message) {
            if (!message || message.trim().length === 0) {
                return { valid: false, error: 'Please write a message first 💬' };
            }
            if (message.length > MESSAGE_MAX_LENGTH) {
                return { 
                    valid: false, 
                    error: `Message is too long. Maximum ${MESSAGE_MAX_LENGTH} characters allowed.` 
                };
            }
            return { valid: true };
        }

        // Generate gift link
        function generateGiftLink(flower, sender, message) {
            const msgFormatted = message.replace(/[^a-zA-Z0-9]/g, '-');
            return `https://t.me/${TELEGRAM_BOT_USERNAME}?start=gift_${flower.key}_${sender}_${msgFormatted}`;
        }

        // Send flower handler
        function sendFlower() {
            if (!selectedFlower) {
                console.error('No flower selected');
                return;
            }

            const message = elements.messageInput.value.trim();
            const validation = validateMessage(message);

            if (!validation.valid) {
                alert(validation.error);
                return;
            }

            const tg = initTelegram();
            const sender = tg?.initDataUnsafe?.user?.first_name || 'Someone';
            const link = generateGiftLink(selectedFlower, sender, message);

            if (tg && tg.openTelegramLink) {
                tg.openTelegramLink(link);
            } else {
                // Fallback for non-Telegram environments
                window.open(link, '_blank');
            }
        }

        // Initialize app
        function init() {
            initTelegram();
            renderFlowers();
            
            // Message input handler
            elements.messageInput.addEventListener('input', updateSendButtonState);
            
            // Prevent form submission
            elements.sendBtn.addEventListener('click', (e) => {
                e.preventDefault();
                sendFlower();
            });
        }

        // Start the app
        init();
    })();
</script>
</body>
</html>
